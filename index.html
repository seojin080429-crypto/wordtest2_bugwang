<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>3학년 수능특강 영단어</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f6fa;
    --surface: #ffffff;
    --surface2: #f0f1f8;
    --border: #e0e2ee;
    --accent: #5b4ef8;
    --accent2: #e84393;
    --accent3: #0bb87a;
    --text: #1a1a2e;
    --text-dim: #7878a0;
    --correct: #16a34a;
    --wrong: #dc2626;
    --card-h: 260px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .app-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .app-title {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 1px;
  }
  .progress-bar-wrap {
    flex: 1;
    margin: 0 12px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  .progress-text {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
  }

  /* ── STAGE TABS ── */
  .stage-tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 8px;
    gap: 4px;
  }
  .stage-tab {
    flex: 1;
    padding: 10px 4px;
    text-align: center;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    user-select: none;
  }
  .stage-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .stage-tab .tab-icon { font-size: 16px; display: block; margin-bottom: 2px; }

  /* ── SCREENS ── */
  .screen { display: none; padding: 16px; }
  .screen.active { display: block; }

  /* ── FLASH CARD SCREEN ── */
  .flash-controls {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .ctrl-btn {
    padding: 7px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .ctrl-btn:active { transform: scale(0.95); }
  .ctrl-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .card-area {
    perspective: 1000px;
    margin-bottom: 16px;
  }
  .flash-card {
    width: 100%;
    min-height: var(--card-h);
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(.4,0,.2,1);
    cursor: pointer;
  }
  .flash-card.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute;
    width: 100%;
    min-height: var(--card-h);
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px 24px;
    text-align: center;
  }
  .card-front {
    background: linear-gradient(135deg, #ffffff 0%, #eef0ff 100%);
    border: 1px solid var(--border);
    box-shadow: 0 4px 20px rgba(91,78,248,0.08);
  }
  .card-back {
    background: linear-gradient(135deg, #eef0ff 0%, #e8f8f2 100%);
    border: 1px solid var(--accent);
    box-shadow: 0 4px 20px rgba(91,78,248,0.12);
    transform: rotateY(180deg);
  }
  .card-num {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }
  .card-word {
    font-family: 'Space Mono', monospace;
    font-size: clamp(22px, 6vw, 32px);
    font-weight: 700;
    color: var(--text);
    margin-bottom: 8px;
    letter-spacing: 1px;
  }
  .card-hint { font-size: 12px; color: var(--text-dim); }
  .card-meaning {
    font-size: clamp(18px, 5vw, 26px);
    font-weight: 700;
    color: var(--accent3);
    margin-bottom: 10px;
  }
  .card-word-back {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    color: var(--text-dim);
    margin-top: 8px;
  }

  .nav-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .nav-btn {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 20px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .nav-btn:active { transform: scale(0.95); background: var(--accent); }
  .nav-btn.primary { background: var(--accent); border-color: var(--accent); }

  .known-btns {
    display: flex;
    gap: 10px;
    margin-top: 12px;
  }
  .known-btn {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    border: none;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .known-btn:active { transform: scale(0.95); }
  .btn-know { background: rgba(74,222,128,0.15); color: var(--correct); border: 1px solid var(--correct); }
  .btn-dontknow { background: rgba(248,113,113,0.15); color: var(--wrong); border: 1px solid var(--wrong); }

  .stats-row {
    display: flex;
    gap: 8px;
    margin-top: 14px;
  }
  .stat-box {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    text-align: center;
  }
  .stat-num { font-family: 'Space Mono', monospace; font-size: 20px; font-weight: 700; }
  .stat-label { font-size: 10px; color: var(--text-dim); margin-top: 2px; }
  .stat-know .stat-num { color: var(--correct); }
  .stat-dontknow .stat-num { color: var(--wrong); }
  .stat-remain .stat-num { color: var(--accent); }

  /* ── RECALL SCREEN ── */
  .recall-question {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    text-align: center;
    margin-bottom: 16px;
    min-height: 120px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .recall-type {
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 2px;
    font-family: 'Space Mono', monospace;
    margin-bottom: 10px;
    text-transform: uppercase;
  }
  .recall-word {
    font-family: 'Space Mono', monospace;
    font-size: clamp(20px, 5.5vw, 28px);
    font-weight: 700;
    color: var(--text);
  }
  .recall-meaning-q {
    font-size: clamp(18px, 4.5vw, 24px);
    font-weight: 700;
    color: var(--accent3);
  }

  .choices-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }
  .choice-btn {
    padding: 14px 10px;
    border-radius: 12px;
    border: 1.5px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    font-family: 'Noto Sans KR', sans-serif;
    line-height: 1.4;
  }
  .choice-btn:active { transform: scale(0.97); }
  .choice-btn.correct { background: rgba(74,222,128,0.2); border-color: var(--correct); color: var(--correct); }
  .choice-btn.wrong { background: rgba(248,113,113,0.2); border-color: var(--wrong); color: var(--wrong); }
  .choice-btn:disabled { cursor: default; }

  .recall-feedback {
    text-align: center;
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 12px;
    min-height: 20px;
    transition: all 0.2s;
  }
  .recall-score {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }

  /* ── SPELL SCREEN ── */
  .spell-question {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    text-align: center;
    margin-bottom: 16px;
  }
  .spell-label {
    font-size: 10px;
    color: var(--accent2);
    letter-spacing: 2px;
    font-family: 'Space Mono', monospace;
    margin-bottom: 10px;
  }
  .spell-meaning {
    font-size: clamp(18px, 5vw, 24px);
    font-weight: 700;
    color: var(--accent3);
    margin-bottom: 8px;
  }
  .spell-hint-text {
    font-size: 12px;
    color: var(--text-dim);
  }

  .spell-input-area {
    margin-bottom: 14px;
  }
  .letter-display {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    margin-bottom: 14px;
    min-height: 48px;
    align-items: center;
  }
  .letter-box {
    width: 32px;
    height: 40px;
    border-radius: 6px;
    border: 1.5px solid var(--border);
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    transition: all 0.2s;
  }
  .letter-box.filled { border-color: var(--accent); color: var(--accent); }
  .letter-box.correct-l { border-color: var(--correct); color: var(--correct); background: rgba(74,222,128,0.1); }
  .letter-box.wrong-l { border-color: var(--wrong); color: var(--wrong); background: rgba(248,113,113,0.1); }
  .letter-box.space-l { border-color: transparent; background: transparent; width: 10px; }

  .spell-input {
    width: 100%;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1.5px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s;
    caret-color: var(--accent);
  }
  .spell-input:focus { border-color: var(--accent); }
  .spell-input.correct-border { border-color: var(--correct); }
  .spell-input.wrong-border { border-color: var(--wrong); }

  .spell-btn-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .spell-submit {
    flex: 2;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.15s;
  }
  .spell-submit:active { transform: scale(0.97); }
  .spell-hint-btn {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-dim);
    font-size: 13px;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.15s;
  }
  .spell-hint-btn:active { transform: scale(0.97); }

  .spell-feedback {
    text-align: center;
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 10px;
    min-height: 20px;
  }
  .spell-answer-reveal {
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 16px;
    color: var(--correct);
    margin-bottom: 10px;
    min-height: 20px;
  }

  /* ── SECTION SELECTOR ── */
  .section-wrap {
    margin-bottom: 14px;
  }
  .section-label {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 8px;
    letter-spacing: 1px;
  }
  .section-btns {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .section-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Space Mono', monospace;
  }
  .section-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .section-btn:active { transform: scale(0.95); }

  /* ── MODE TOGGLE ── */
  .mode-toggle {
    display: flex;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 14px;
  }
  .mode-btn {
    flex: 1;
    padding: 9px;
    text-align: center;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--text-dim);
    font-family: 'Noto Sans KR', sans-serif;
  }
  .mode-btn.active { background: var(--accent); color: #fff; }

  /* ── COMPLETION ── */
  .completion {
    text-align: center;
    padding: 40px 20px;
  }
  .completion-emoji { font-size: 60px; margin-bottom: 16px; }
  .completion-title { font-size: 22px; font-weight: 900; margin-bottom: 8px; }
  .completion-sub { font-size: 14px; color: var(--text-dim); margin-bottom: 24px; }
  .restart-btn {
    padding: 14px 32px;
    border-radius: 12px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
  }

  /* ── SHUFFLE indicator ── */
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
    font-family: 'Space Mono', monospace;
    background: rgba(124,106,255,0.2);
    color: var(--accent);
    border: 1px solid var(--accent);
    margin-left: 6px;
    vertical-align: middle;
  }

  @media (max-width: 360px) {
    .choices-grid { grid-template-columns: 1fr; }
    .choice-btn { font-size: 12px; }
  }
</style>
</head>
<body>

<div class="app-header">
  <div class="app-title">수능특강</div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
  </div>
  <div class="progress-text" id="progressText">0 / 0</div>
</div>

<div class="stage-tabs">
  <div class="stage-tab active" id="tab-flash" onclick="switchStage('flash')">
    <span class="tab-icon">🃏</span>암기
  </div>
  <div class="stage-tab" id="tab-recall" onclick="switchStage('recall')">
    <span class="tab-icon">🧠</span>리콜
  </div>
  <div class="stage-tab" id="tab-spell" onclick="switchStage('spell')">
    <span class="tab-icon">✍️</span>스펠
  </div>
</div>

<!-- ═══════════════════════ FLASH SCREEN ═══════════════════════ -->
<div class="screen active" id="screen-flash">
  <div class="section-wrap">
    <div class="section-label">범위 선택</div>
    <div class="section-btns" id="flash-sections"></div>
  </div>

  <div class="flash-controls">
    <button class="ctrl-btn active" id="btn-shuffle-flash" onclick="toggleShuffle('flash')">🔀 셔플</button>
    <button class="ctrl-btn" id="btn-dir-flash" onclick="toggleDir('flash')">🔤→뜻</button>
    <button class="ctrl-btn" id="btn-unknown-only" onclick="toggleUnknownOnly()">❌만 보기</button>
  </div>

  <div class="card-area" id="flashCardArea">
    <div class="flash-card" id="flashCard" onclick="flipCard()">
      <div class="card-face card-front">
        <div class="card-num" id="cardNum"></div>
        <div class="card-word" id="cardFront"></div>
        <div class="card-hint" id="cardHint">탭하여 뒤집기</div>
      </div>
      <div class="card-face card-back">
        <div class="card-meaning" id="cardBack"></div>
        <div class="card-word-back" id="cardWordBack"></div>
      </div>
    </div>
  </div>

  <div class="nav-row">
    <button class="nav-btn" onclick="prevCard()">◀</button>
    <button class="nav-btn primary" onclick="flipCard()">뒤집기</button>
    <button class="nav-btn" onclick="nextCard()">▶</button>
  </div>

  <div class="known-btns" id="knownBtns">
    <button class="known-btn btn-dontknow" onclick="markCard(false)">❌ 모름</button>
    <button class="known-btn btn-know" onclick="markCard(true)">✅ 알아</button>
  </div>

  <div class="stats-row">
    <div class="stat-box stat-know">
      <div class="stat-num" id="statKnow">0</div>
      <div class="stat-label">알아</div>
    </div>
    <div class="stat-box stat-dontknow">
      <div class="stat-num" id="statDontKnow">0</div>
      <div class="stat-label">모름</div>
    </div>
    <div class="stat-box stat-remain">
      <div class="stat-num" id="statRemain">0</div>
      <div class="stat-label">남음</div>
    </div>
  </div>
</div>

<!-- ═══════════════════════ RECALL SCREEN ═══════════════════════ -->
<div class="screen" id="screen-recall">
  <div class="section-wrap">
    <div class="section-label">범위 선택</div>
    <div class="section-btns" id="recall-sections"></div>
  </div>

  <div class="mode-toggle">
    <div class="mode-btn active" id="recall-mode-wtm" onclick="setRecallMode('wtm')">단어 → 뜻</div>
    <div class="mode-btn" id="recall-mode-mtw" onclick="setRecallMode('mtw')">뜻 → 단어</div>
  </div>

  <div class="recall-score">
    <div class="stat-box stat-know">
      <div class="stat-num" id="recallCorrect">0</div>
      <div class="stat-label">정답</div>
    </div>
    <div class="stat-box stat-dontknow">
      <div class="stat-num" id="recallWrong">0</div>
      <div class="stat-label">오답</div>
    </div>
    <div class="stat-box stat-remain">
      <div class="stat-num" id="recallRemain">0</div>
      <div class="stat-label">남음</div>
    </div>
  </div>

  <div class="recall-question">
    <div class="recall-type" id="recallType">단어 → 뜻</div>
    <div id="recallQuestion" class="recall-word">-</div>
  </div>

  <div class="choices-grid" id="choicesGrid"></div>
  <div class="recall-feedback" id="recallFeedback"></div>

  <div class="nav-row">
    <button class="nav-btn primary" style="max-width:200px;margin:0 auto;" onclick="nextRecall()">다음 문제 ▶</button>
  </div>
</div>

<!-- ═══════════════════════ SPELL SCREEN ═══════════════════════ -->
<div class="screen" id="screen-spell">
  <div class="section-wrap">
    <div class="section-label">범위 선택</div>
    <div class="section-btns" id="spell-sections"></div>
  </div>

  <div class="recall-score">
    <div class="stat-box stat-know">
      <div class="stat-num" id="spellCorrect">0</div>
      <div class="stat-label">정답</div>
    </div>
    <div class="stat-box stat-dontknow">
      <div class="stat-num" id="spellWrong">0</div>
      <div class="stat-label">오답</div>
    </div>
    <div class="stat-box stat-remain">
      <div class="stat-num" id="spellRemain">0</div>
      <div class="stat-label">남음</div>
    </div>
  </div>

  <div class="spell-question">
    <div class="spell-label">뜻을 보고 영단어를 입력하세요</div>
    <div class="spell-meaning" id="spellMeaning">-</div>
    <div class="spell-hint-text" id="spellHintText"></div>
  </div>

  <div class="spell-input-area">
    <div class="letter-display" id="letterDisplay"></div>
    <input class="spell-input" id="spellInput" type="text" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" placeholder="영단어 입력..." oninput="onSpellInput()" onkeydown="onSpellKey(event)">
  </div>

  <div class="spell-feedback" id="spellFeedback"></div>
  <div class="spell-answer-reveal" id="spellAnswer"></div>

  <div class="spell-btn-row">
    <button class="spell-hint-btn" onclick="showSpellHint()">힌트 💡</button>
    <button class="spell-submit" onclick="checkSpell()">확인 ✓</button>
  </div>

  <div class="nav-row" style="margin-top:8px;">
    <button class="nav-btn primary" style="max-width:200px;margin:0 auto;" onclick="nextSpell()">다음 ▶</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
// VOCABULARY DATA

const ALL_WORDS = [

let currentStage = 'flash';

// Flash

// ═══════════════ INIT ═══════════════
function init() {
  buildSectionBtns('flash-sections', 'flash', flashSectionIdx, onFlashSectionChange);
  buildSectionBtns('recall-sections', 'recall', recallSectionIdx, onRecallSectionChange);
  buildSectionBtns('spell-sections', 'spell', spellSectionIdx, onSpellSectionChange);
  initFlash();
  initRecall();
  initSpell();
}

function buildSectionBtns(containerId, prefix, activeIdx, callback) {
  const c = document.getElementById(containerId);
  c.innerHTML = '';
  SECTIONS.forEach((s, i) => {
    const b = document.createElement('button');
    b.className = 'section-btn' + (i === activeIdx ? ' active' : '');
    b.textContent = s.label;
    b.onclick = () => {
      c.querySelectorAll('.section-btn').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      callback(i);
    };
    c.appendChild(b);
  });
}

function switchStage(stage) {
  currentStage = stage;
  document.querySelectorAll('.stage-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + stage).classList.add('active');
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + stage).classList.add('active');
  updateProgress();
}

// ═══════════════════════════════════
// FLASH CARD
// ═══════════════════════════════════
function getFlashSource() {
  let words = SECTIONS[flashSectionIdx].words.slice();
  if (flashUnknownOnly && flashUnknown.size > 0) {
    words = words.filter(w => flashUnknown.has(w.n));
  }
  return words;
}

function initFlash() {
  flashKnown = new Set();
  flashUnknown = new Set(getFlashSource().map(w => w.n));
  buildFlashDeck();
  flashIdx = 0;
  showFlashCard();
  updateFlashStats();
}

function buildFlashDeck() {
  flashDeck = getFlashSource().slice();
  if (flashShuffle) shuffle(flashDeck);
}

function showFlashCard() {
  const card = flashDeck[flashIdx];
  if (!card) return;
  document.getElementById('flashCard').classList.remove('flipped');
  document.getElementById('cardNum').textContent = `#${card.n} (${flashIdx+1}/${flashDeck.length})`;

  if (flashDir === 'wtm') {
    document.getElementById('cardFront').textContent = card.w;
    document.getElementById('cardHint').textContent = '탭하여 뜻 확인';
    document.getElementById('cardBack').textContent = card.m;
    document.getElementById('cardWordBack').textContent = card.w;
  } else {
    document.getElementById('cardFront').textContent = card.m;
    document.getElementById('cardHint').textContent = '탭하여 단어 확인';
    document.getElementById('cardBack').textContent = card.w;
    document.getElementById('cardWordBack').textContent = card.m;
  }
  updateProgress();
}

function flipCard() {
  document.getElementById('flashCard').classList.toggle('flipped');
}

function prevCard() {
  if (flashIdx > 0) { flashIdx--; showFlashCard(); }
}

function nextCard() {
  if (flashIdx < flashDeck.length - 1) { flashIdx++; showFlashCard(); }
}

function markCard(know) {
  const card = flashDeck[flashIdx];
  if (!card) return;
  if (know) { flashKnown.add(card.n); flashUnknown.delete(card.n); }
  else { flashUnknown.add(card.n); flashKnown.delete(card.n); }
  updateFlashStats();
  if (flashIdx < flashDeck.length - 1) { flashIdx++; showFlashCard(); }
}

function updateFlashStats() {
  const total = flashDeck.length;
  document.getElementById('statKnow').textContent = flashKnown.size;
  document.getElementById('statDontKnow').textContent = flashUnknown.size;
  document.getElementById('statRemain').textContent = total - flashIdx - 1 < 0 ? 0 : total - flashIdx - 1;
}

function toggleShuffle(stage) {
  flashShuffle = !flashShuffle;
  document.getElementById('btn-shuffle-flash').classList.toggle('active', flashShuffle);
  buildFlashDeck(); flashIdx = 0; showFlashCard();
}

function toggleDir(stage) {
  flashDir = flashDir === 'wtm' ? 'mtw' : 'wtm';
  const btn = document.getElementById('btn-dir-flash');
  btn.textContent = flashDir === 'wtm' ? '🔤→뜻' : '뜻→🔤';
  showFlashCard();
}

function toggleUnknownOnly() {
  flashUnknownOnly = !flashUnknownOnly;
  document.getElementById('btn-unknown-only').classList.toggle('active', flashUnknownOnly);
  buildFlashDeck(); flashIdx = 0; showFlashCard(); updateFlashStats();
}

function onFlashSectionChange(i) {
  flashSectionIdx = i;
  flashKnown = new Set(); flashUnknown = new Set();
  buildFlashDeck(); flashIdx = 0; showFlashCard(); updateFlashStats();
}

// ═══════════════════════════════════
// RECALL
// ═══════════════════════════════════
function initRecall() {
  recallDeck = SECTIONS[recallSectionIdx].words.slice();
  shuffle(recallDeck);
  recallIdx = 0;
  recallCorrectCount = 0;
  recallWrongCount = 0;
  recallAnswered = false;
  showRecallQuestion();
  updateRecallStats();
}

function setRecallMode(mode) {
  recallMode = mode;
  document.getElementById('recall-mode-wtm').classList.toggle('active', mode === 'wtm');
  document.getElementById('recall-mode-mtw').classList.toggle('active', mode === 'mtw');
  showRecallQuestion();
}

function showRecallQuestion() {
  recallAnswered = false;
  document.getElementById('recallFeedback').textContent = '';
  const card = recallDeck[recallIdx];
  if (!card) { showRecallComplete(); return; }

  document.getElementById('recallType').textContent = recallMode === 'wtm' ? '단어 → 뜻' : '뜻 → 단어';
  const qEl = document.getElementById('recallQuestion');
  if (recallMode === 'wtm') {
    qEl.className = 'recall-word';
    qEl.textContent = card.w;
  } else {
    qEl.className = 'recall-meaning-q';
    qEl.textContent = card.m;
  }

  // Build 4 choices
  const pool = SECTIONS[recallSectionIdx].words.filter(w => w.n !== card.n);
  shuffle(pool);
  const wrongs = pool.slice(0, 3);
  const choices = shuffle([card, ...wrongs]);

  const grid = document.getElementById('choicesGrid');
  grid.innerHTML = '';
  choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = recallMode === 'wtm' ? c.m : c.w;
    btn.onclick = () => checkRecall(btn, c.n === card.n, card);
    grid.appendChild(btn);
  });
  updateProgress();
}

function checkRecall(btn, isCorrect, card) {
  if (recallAnswered) return;
  recallAnswered = true;
  const fb = document.getElementById('recallFeedback');
  const grid = document.getElementById('choicesGrid');
  const allBtns = grid.querySelectorAll('.choice-btn');

  allBtns.forEach(b => {
    b.disabled = true;
    const bText = b.textContent;
    const correctText = recallMode === 'wtm' ? card.m : card.w;
    if (bText === correctText) b.classList.add('correct');
  });

  if (isCorrect) {
    btn.classList.add('correct');
    fb.style.color = 'var(--correct)';
    fb.textContent = '✅ 정답!';
    recallCorrectCount++;
  } else {
    btn.classList.add('wrong');
    fb.style.color = 'var(--wrong)';
    fb.textContent = `❌ 오답! 정답: ${recallMode === 'wtm' ? card.m : card.w}`;
    recallWrongCount++;
  }
  updateRecallStats();
}

function nextRecall() {
  if (!recallAnswered && recallDeck[recallIdx]) {
    document.getElementById('recallFeedback').style.color = 'var(--wrong)';
    document.getElementById('recallFeedback').textContent = '문제를 먼저 풀어주세요!';
    return;
  }
  recallIdx++;
  showRecallQuestion();
}

function updateRecallStats() {
  document.getElementById('recallCorrect').textContent = recallCorrectCount;
  document.getElementById('recallWrong').textContent = recallWrongCount;
  const rem = Math.max(0, recallDeck.length - recallIdx);
  document.getElementById('recallRemain').textContent = rem;
}

function onRecallSectionChange(i) {
  recallSectionIdx = i;
  initRecall();
}

function showRecallComplete() {
  document.getElementById('recallQuestion').textContent = '완료! 🎉';
  document.getElementById('choicesGrid').innerHTML = '';
  document.getElementById('recallFeedback').textContent = `${recallCorrectCount}/${recallDeck.length} 정답`;
}

// SPELL
// ═══════════════════════════════════
function initSpell() {
  spellDeck = SECTIONS[spellSectionIdx].words.slice();
  shuffle(spellDeck);
  spellIdx = 0;
  spellCorrectCount = 0;
  spellWrongCount = 0;
  spellAnswered = false;
  spellHintCount = 0;
  showSpellQuestion();
  updateSpellStats();
}

function showSpellQuestion() {
  spellAnswered = false;
  spellHintCount = 0;
  const card = spellDeck[spellIdx];
  if (!card) { showSpellComplete(); return; }

  document.getElementById('spellMeaning').textContent = card.m;
  document.getElementById('spellHintText').textContent = `(${card.w.length}글자)`;
  document.getElementById('spellFeedback').textContent = '';
  document.getElementById('spellAnswer').textContent = '';

  const input = document.getElementById('spellInput');
  input.value = '';
  input.className = 'spell-input';
  input.disabled = false;

  renderLetterBoxes('');
  updateProgress();
  setTimeout(() => input.focus(), 100);
}

function renderLetterBoxes(typed) {
  const card = spellDeck[spellIdx];
  if (!card) return;
  const target = card.w.toLowerCase();
  const typedL = typed.toLowerCase();
  const display = document.getElementById('letterDisplay');
  display.innerHTML = '';

  for (let i = 0; i < target.length; i++) {
    const box = document.createElement('div');
    if (target[i] === ' ') {
      box.className = 'letter-box space-l';
    } else {
      box.className = 'letter-box';
      const ch = typedL[i] || '';
      if (ch) {
        box.classList.add('filled');
        box.textContent = ch;
        if (spellAnswered) {
          box.classList.remove('filled');
          if (ch === target[i]) box.classList.add('correct-l');
          else box.classList.add('wrong-l');
        }
      } else {
        box.textContent = '';
      }
    }
    display.appendChild(box);
  }
}

function onSpellInput() {
  const typed = document.getElementById('spellInput').value;
  renderLetterBoxes(typed);
}

function onSpellKey(e) {
  if (e.key === 'Enter') {
    if (spellAnswered) nextSpell();
    else checkSpell();
  }
}

function checkSpell() {
  if (spellAnswered) return;
  const card = spellDeck[spellIdx];
  if (!card) return;
  const typed = document.getElementById('spellInput').value.trim().toLowerCase();
  const target = card.w.toLowerCase();
  spellAnswered = true;

  renderLetterBoxes(typed);

  const fb = document.getElementById('spellFeedback');
  const input = document.getElementById('spellInput');

  if (typed === target) {
    fb.style.color = 'var(--correct)';
    fb.textContent = '✅ 정답!';
    input.className = 'spell-input correct-border';
    spellCorrectCount++;
    document.getElementById('spellAnswer').textContent = '';
  } else {
    fb.style.color = 'var(--wrong)';
    fb.textContent = '❌ 오답!';
    input.className = 'spell-input wrong-border';
    document.getElementById('spellAnswer').textContent = `정답: ${card.w}`;
    spellWrongCount++;
  }
  input.disabled = true;
  updateSpellStats();
}

function showSpellHint() {
  const card = spellDeck[spellIdx];
  if (!card || spellAnswered) return;
  spellHintCount++;
  const revealCount = Math.min(spellHintCount, Math.ceil(card.w.length / 2));
  // Set the input to first N chars
  const input = document.getElementById('spellInput');
  input.value = card.w.substring(0, revealCount);
  renderLetterBoxes(input.value);
  document.getElementById('spellHintText').textContent = `힌트: ${card.w.substring(0, revealCount)}${'_'.repeat(card.w.length - revealCount)}`;
}

function nextSpell() {
  if (!spellAnswered && spellDeck[spellIdx]) {
    document.getElementById('spellFeedback').style.color = 'var(--wrong)';
    document.getElementById('spellFeedback').textContent = '먼저 확인 버튼을 눌러주세요!';
    return;
  }
  spellIdx++;
  showSpellQuestion();
}

function updateSpellStats() {
  document.getElementById('spellCorrect').textContent = spellCorrectCount;
  document.getElementById('spellWrong').textContent = spellWrongCount;
  const rem = Math.max(0, spellDeck.length - spellIdx);
  document.getElementById('spellRemain').textContent = rem;
}

function onSpellSectionChange(i) {
  spellSectionIdx = i;
  initSpell();
}

function showSpellComplete() {
  document.getElementById('spellMeaning').textContent = '모두 완료! 🎉';
  document.getElementById('spellHintText').textContent = `${spellCorrectCount}/${spellDeck.length} 정답`;
  document.getElementById('spellFeedback').textContent = '';
}

// ═══════════════════════════════════
// UTILS
// ═══════════════════════════════════
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function updateProgress() {
  let cur, total;
  if (currentStage === 'flash') {
    cur = flashIdx + 1; total = flashDeck.length;
  } else if (currentStage === 'recall') {
    cur = recallIdx; total = recallDeck.length;
  } else {
    cur = spellIdx; total = spellDeck.length;
  }
  const pct = total > 0 ? (cur / total * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${cur} / ${total}`;
}

// Swipe support for flash cards
let touchStartX = 0;
document.getElementById('flashCard').addEventListener('touchstart', e => {
  touchStartX = e.changedTouches[0].screenX;
}, {passive: true});
document.getElementById('flashCard').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].screenX - touchStartX;
  if (Math.abs(dx) < 30) { flipCard(); return; }
  if (dx < -30) nextCard();
  else if (dx > 30) prevCard();
}, {passive: true});

init();
</script>
